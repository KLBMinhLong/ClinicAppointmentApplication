<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
<h1>Danh sach bac si</h1>

<div class="auth-note" th:if="${isAuthenticated}">
    Xin chao, <strong th:text="${currentUsername}">user</strong>
</div>

<div class="nav">
    <a th:href="@{/home}">Home</a>
    <a th:href="@{/courses}">Courses</a>
    <a th:href="@{/enroll}">Enroll</a>
    <a th:href="@{/admin/doctors}">Admin CRUD Bac Si</a>
    <a th:if="${!isAuthenticated}" th:href="@{/register}">Dang ky</a>
    <a th:if="${!isAuthenticated}" th:href="@{/login}">Dang nhap</a>
    <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post">
        <button type="submit">Dang xuat</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>Ten bac si</th>
        <th>Chuyen khoa</th>
        <th>Khoa</th>
        <th>Hinh anh</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(doctors)}">
        <td colspan="4">Chua co du lieu bac si.</td>
    </tr>
    <tr th:each="doctor : ${doctors}">
        <td th:text="${doctor.name}">Ten bac si</td>
        <td th:text="${doctor.specialty}">Chuyen khoa</td>
        <td th:text="${doctor.department.name}">Khoa</td>
        <td>
            <img th:if="${doctor.image != null and !doctor.image.isEmpty()}"
                 th:src="${doctor.image}"
                 th:alt="${doctor.name}"
                 width="100" height="100">
            <span th:if="${doctor.image == null or doctor.image.isEmpty()}">Khong co anh</span>
        </td>
    </tr>
    </tbody>
</table>

<div class="pagination">
    <a th:if="${currentPage > 0}" th:href="@{/home(page=${currentPage - 1})}">Trang truoc</a>
    <span th:if="${totalPages > 0}" th:text="' Trang ' + (${currentPage} + 1) + ' / ' + ${totalPages} + ' '">Trang</span>
    <a th:if="${currentPage + 1 < totalPages}" th:href="@{/home(page=${currentPage + 1})}">Trang sau</a>
</div>
</div>
</body>
</html>
