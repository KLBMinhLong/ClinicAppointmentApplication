<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
<h1>Trang courses</h1>
<div class="nav">
    <a th:href="@{/home}">Home</a>
    <a th:if="${!isAuthenticated}" th:href="@{/login}">Dang nhap</a>

    <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post">
        <button type="submit">Dang xuat</button>
    </form>
</div>
<p>Trang nay cho tat ca nguoi dung truy cap.</p>
</div>
</body>
</html>
